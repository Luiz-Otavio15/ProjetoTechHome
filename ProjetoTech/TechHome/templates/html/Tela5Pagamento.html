{ load static }

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pagamento - TechHome</title>
  <link rel="stylesheet" href="{% static 'css/Tela5_Pagamento.css'%}">
</head>

<body>

  <!-- CABEÇALHO -->
  <header class="cabecalho">
    <h1 class="marca">TechHome</h1>

    <nav class="menu">
      <a href="Tela1_Home.html">Início</a>
      <a href="#">Produtos</a>
      <a href="Tela2_Contato.html">Contato</a>
    </nav>
  </header>

  <!-- CONTEÚDO -->
  <main class="pagina-pagamento">

    <h2 class="titulo">Finalizar Compra</h2>

    <div class="container-pagamento">

      <!-- DADOS DO CLIENTE -->
      <form class="form-pagamento">

        <h3>Dados do Cliente</h3>

        <input type="text" placeholder="Nome completo" required>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="CPF" required>

        <h3>Endereço</h3>

        <input type="text" placeholder="Rua e número" required>
        <input type="text" placeholder="Cidade" required>
        <input type="text" placeholder="Estado" required>

        <h3>Pagamento</h3>

        <select>
          <option>Cartão de Crédito</option>
          <option>Pix</option>
          <option>Boleto</option>
        </select>

        <button type="submit" class="btn-finalizar">Finalizar Compra</button>

      </form>

      <!-- RESUMO -->
      <div class="resumo-compra">
        <h3>Resumo do Pedido</h3>

        <p>Produto: Notebook Gamer</p>
        <p>Preço: R$ 4.999</p>
        <hr>
        <p class="total">Total: R$ 4.999</p>
      </div>

    </div>

  </main>

  <!-- RODAPÉ -->
  <footer class="rodape">
    <p>© 2026 TechHome Direitos Autorais Para José Matheus</p>
  </footer>

</body>
</html>
